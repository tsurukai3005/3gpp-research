ai_6gr_waveform:
  title: "6GR Waveform (10.2.1)"
  parent_si: "6GR_BasicAirInterface"
  current_phase: "study"
  aliases:
    - "6GR waveform"
    - "6G 波形"
    - "PAPR reduction"
    - "FDSS"
    - "FDSS-SE"
    - "FDSS-ST"
    - "DFT-s-OFDM PAPR"
    - "spectrum extension"
    - "spectrum truncation"
    - "tone reservation"
    - "GMSK approximation FDSS"
    - "CFR-SE"
    - "AI/ML PAPR"
    - "AI ML waveform"
    - "multi-rank UL DFT-s-OFDM"
    - "multi-layer DFT-s-OFDM"
    - "low PAPR waveform"
    - "Net Gain 6GR"
    - "Pruning QAM"
    - "AFDM"
    - "Zak-OTFS"           # #124bis で deprioritized、追跡用に維持
    - "CP-OFDM 6G"
    - "10.2.1"
  description: |
    6GR の物理層波形検討。CP-OFDM (DL) / DFT-s-OFDM (UL) 継承を #122 で大枠合意。
    #124 で UL low-PAPR DFT-s-OFDM 候補 11 種をリスト化、multi-rank UL DFT-s-OFDM を
    high-priority study に指定、DL DFT-s-OFDM は deprioritize で決着（FL #2 Conclusion）。
    #124bis で 3 候補（FDSS / FDSS-SE / FDSS-ST for π/2 BPSK）に down-select、
    Cohere の Zak-OTFS / Zak-OTFS-over-OFDM は noted（廃案）。
    FL: Klaus / Nokia。Ad-Hoc Chair: NTT DOCOMO。

