ai_6gr_harq:
  title: "6GR HARQ related Aspects (10.5.4.3)"
  parent_si: "6GR_BasicAirInterface"
  current_phase: "study"
  aliases:
    - "6GR HARQ"
    - "6G HARQ"
    - "control/HARQ provisions"
    - "TN/NTN HARQ"
    - "TN/NTN 共通 HARQ"
    - "HARQ process number"
    - "HARQ stalling"
    - "HARQ disable"
    - "HARQ-ACK codebook 6G"
    - "HARQ feedback granularity"
    - "10.5.4.3"
  description: |
    6G の HARQ 関連事項（AI 10.5.4.3 配下）。FL: Kevin (OPPO)。
    #124 で 9 軸の評価軸 + Mechanism 1 (L1) / 2 (MAC CE) + asynch+adaptive + TB level 確定。
    #124bis でサブ TB / TB 横断 bundling / HARQ-ACK codebook / payload 1〜1706 bits / timing 4 method
    (Dynamic DCI / UE-initiated / 半静的 next slot / RRC only) / UL HARQ → fast ARQ trigger。
    NTN（高 RTT）対応、URLLC 向け低遅延 A/N、A-IoT 非対称性が論点。

ai_6gr_ntn:
  title: "6GR NTN (10.7)"
  parent_si: "6GR_BasicAirInterface"
  current_phase: "study"
  aliases:
    - "6GR NTN"
    - "6G NTN"
    - "TN/NTN 共通"
    - "TN/NTN common"
    - "TN performance prioritized"
    - "NTN 6G"
    - "regenerative payload 6G"
    - "GNSS-less NTN"
    - "GNSS-based NTN"
    - "MEO-7000"
    - "k_offset 6G"
    - "10.7"
    - "10.7.1"
    - "10.7.2"
  description: |
    6GR NTN 物理層検討。FL: Alberto (Qualcomm)。
    #124 で TN performance prioritized 原則 (Conclusion) + GNSS 用語 (based/degraded/less) +
    orbit/band 評価 (S/Ka/Ku × LEO/GEO) + NTN 固有検討事項リスト (HARQ enable/disable, process 数,
    timing, multi-satellite, multi-beam 等)。
    #124bis で HARQ stalling 4 解決策 (feedback disable / multi-slot / process reuse / sufficient count)
    + TN harmonization の FFS + MEO-7000 追加 + duplex (FD-FDD, HD-FDD UE side) + multi-satellite
    operation + k_offset 採用 (broadcast、cell/beam specific FFS)。

