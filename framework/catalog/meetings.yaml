    本リポジトリで初めて詳細調査済みの会合。Chair Notes EoM v4（CSI/MIMO 系）/ EoM5（Waveform 系）。
    Waveform: 11 候補 → 3 候補（FDSS / FDSS-SE / FDSS-ST for π/2 BPSK）に down-select。
