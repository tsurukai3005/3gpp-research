# RAN1 会合カタログ
# キー: 会合略号（"#" を含むので必ずクォート）
# 値:
#   date:        会期（"YYYY-MM-DD to YYYY-MM-DD" or 単日）
#   location:    開催地
#   ftp_folder:  3GPP FTP の WG1_RL1/ 配下のフォルダ名（例: TSGR1_124b）
#   status:      planned | ongoing | closed
#   ai_map:      安定 AI ID（agenda-items.yaml のキー） → 当該会合での AI 番号
#                未確認は省略（追跡対象のみ埋めればよい）
#   notes:       メモ（任意）
#
# 補足:
# - 完全な FTP URL は ftp_folder から組み立てる:
#     https://www.3gpp.org/ftp/tsg_ran/WG1_RL1/<ftp_folder>/
# - bis 系は小文字 b（例: TSGR1_124b）。詳細は framework/3gpp-ftp-cookbook.md §1.2
# - ai_map は **追跡対象の AI のみ** 埋める。空欄が多くてよい

